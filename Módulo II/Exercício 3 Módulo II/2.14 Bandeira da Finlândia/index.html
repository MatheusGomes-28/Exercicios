<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeira da Finlândia e Mônaco</title>

    <style>


        .container {
            position: absolute;
            display: block;
            border: 1px solid gray;
            height: 600px;
            width: 900px;
            
            
        }

        .linhaHorizontal {
            position: relative;
            background-color: rgb(17, 17, 155);
            height: 100px;
            top: 235px;
        }

        .linhaVertical {
            position: relative;
            background-color: rgb(17, 17, 155);
            height: 600px;
            width: 100px;
            bottom: 100px;
            left: 210px;
        }




        .containerMonaco {
            position: relative;
            border: 1px solid gray;
            background-color: rgb(255, 255, 255);
            height: 600px;
            width: 900px;
            top: 740px;
        }

        .linhaVermelha {
            position: absolute;
            background-color: red;
            width: 900px;
            height: 330px;
        }

    </style>


</head>
<body>
    

    <div class="container">
        <div class="linhaHorizontal">
        </div>
        <div class="linhaVertical">
        </div>



    </div>

    <div class="containerMonaco">
        <div class="linhaVermelha">
        </div>

    </div>



</body>
</html>
