<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Escreva seu CSS Aqui */


    .flag {
        position: relative;
        width: 900px;
        height: 600px;
        background-color: #ce1126;
        text-align: center;
        color: white;
        font-size: 50px;
    }




    .flag>div {
        position: absolute;
        background-color: #002868;
        margin-top: 9px;
        height: 300px;
        width: 900px;
    }

    .flag > p {
        position:relative;
        top: 10px;
    }

    .flag > div p {
        position: relative;
        background-color: white;
        border-radius: 50%;
        height: 200px;
        width: 200px;
        color: black;
        left: 38%;
        bottom: 19px;
    }
    
    p {
        font-size: 70px;
    }



    
  </style>
</head>

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
